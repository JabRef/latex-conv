name: Check

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: 'false'
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: corretto
          check-latest: true
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      # `build` runs the tests and the doclint-gated javadoc jar
      - name: Build
        run: ./gradlew build
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/

  # The committed conversion-table.tsv must match what the generator produces from the pinned
  # submodules — the same "regenerate and fail on diff" gate JabRef's CI uses for formatting.
  # This is the only job that needs the tools/upstream/ submodules.
  table-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: 'false'
          submodules: true
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: corretto
          check-latest: true
      - name: Regenerate conversion table
        run: java tools/GenerateTable.java
      - name: Fail on drift
        run: git diff --exit-code src/main/resources/org/jabref/latexconv/conversion-table.tsv tools/CONFLICTS.md

  # Lints CHANGELOG.md against the Keep a Changelog format
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: 'false'
      - name: Lint CHANGELOG.md
        uses: jbangdev/jbang-action@v0.141.0
        with:
          script: com.github.nbbrd.heylogs:heylogs-cli:0.19.1:bin
          scriptargs: "check --rule dot-space-link-style:ERROR --format github-actions CHANGELOG.md"
